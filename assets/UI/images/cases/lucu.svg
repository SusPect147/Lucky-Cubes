<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lucuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <filter id="glowLucu">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#lucuGrad)" stroke="#fff" stroke-width="8" filter="url(#glowLucu)"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <text x="100" y="125" font-family="'Inter', sans-serif" font-weight="900" font-size="60" font-style="italic" fill="#fff" text-anchor="middle" letter-spacing="-2">L</text>
  <path d="M70 70 L 130 130 M 130 70 L 70 130" stroke="#fff" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
</svg>
