<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tonCaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glowTon">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="20" y="50" width="160" height="110" rx="25" fill="url(#tonCaseGrad)" stroke="#00d2ff" stroke-width="6" filter="url(#glowTon)"/>
  <path d="M40 50 V 35 C 40 10, 160 10, 160 35 V 50" fill="none" stroke="#00d2ff" stroke-width="12" stroke-linecap="round"/>
  <polygon points="100,80 130,120 70,120" fill="#fff"/>
  <polygon points="100,140 120,125 80,125" fill="#fff"/>
</svg>
