<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="starterCaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5576c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="glowStarter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="30" y="60" width="140" height="90" rx="15" fill="url(#starterCaseGrad)" stroke="#fff" stroke-width="4" filter="url(#glowStarter)"/>
  <path d="M50 60 V 45 C 50 30, 150 30, 150 45 V 60" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="105" r="15" fill="#fff"/>
  <rect x="95" y="100" width="10" height="20" fill="#f5576c" rx="2" ry="2"/>
</svg>
